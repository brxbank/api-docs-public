      summary: Criar Webhook
      description: >-
        Cria um novo webhook para receber notificações de eventos PIX.


        **Campos:**

        - `url` (obrigatório): URL HTTPS que receberá as notificações

        - `events` (opcional): Lista de eventos para filtrar. Se vazio ou
