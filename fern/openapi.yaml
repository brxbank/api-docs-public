          content:
            application/json: {}
  /api/v1/webhooks/deliveries/{delivery_id}/resend:
    post:
      tags:
        - Webhooks (Notificações)
      summary: Reenviar Delivery
      description: >-
        Reenvia manualmente uma delivery que falhou ou não foi entregue.


        Útil quando:

        - Sua URL estava fora do ar e agora voltou

        - Você perdeu uma notificação e precisa reprocessar

        - Quer testar a integração com dados reais


        A delivery será enfileirada novamente e entregue na próxima execução do
        worker.
      requestBody:
        content: {}
      parameters:
        - name: delivery_id
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/pix/p2p/lookup:
    post:
      tags:
        - P2P (Transferência Interna)
      summary: Lookup Interno (Delegação Tenant)
      description: >-
        ## Lookup P2P com Delegação


        O tenant primário busca uma conta destino em nome de um sub-cliente.


        O header `X-Client-ID` indica qual sub-cliente está fazendo a busca. O
        Bearer Token deve ser do tenant primário.


        ### Headers obrigatórios


        | Header | Descrição |

        |--------|----------|

        | `Authorization` | Bearer token do **tenant primário** |

        | `X-Client-ID` | ID do **sub-cliente** em nome do qual se opera |


        ### Comportamento


        - O `ClientID` no contexto será o sub-cliente

        - O `TenantID` será o tenant primário (usado para escopo de busca)

        - A busca retorna contas do mesmo tenant


        ### Scope necessário


        `pix:p2p:read`
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                search_type: email
                search_value: destinatario@exemplo.com
      parameters:
        - name: Authorization
          in: header
          schema:
            type: string
          example: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: X-Client-ID
          in: header
          schema:
            type: string
          description: ID do sub-cliente em nome do qual o tenant está operando
          example: 'sub-client-uuid-here'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/pix/p2p:
    post:
      tags:
        - P2P (Transferência Interna)
      summary: Transferência P2P via Chave PIX
      description: >-
        ## Transferência P2P via Chave PIX Interna


        Alternativa à transferência por account_id. O sistema resolve a chave
        PIX internamente (tabela `pix_keys`) para encontrar a conta destino.


        **Nota**: Só funciona para chaves PIX registradas internamente. Chaves
        externas (de outros ISPBs) devem usar o fluxo Cash-Out convencional.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                external_id: p2p-via-key-001
                amount: '75.50'
                receiver_pix_key: maria@exemplo.com
                description: Divisão da conta
      parameters:
        - name: Authorization
          in: header
          schema:
            type: string
          example: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
