  /api/v1/pix/qrcode/decode:
    post:
      tags:
        - PIX Cash-Out
      summary: Decode QR Code
      operationId: decodeQRCode
      description: >-
        Decodes a PIX QR Code (static or dynamic).


        **Required field:** `br_code` (EMV payload from QR Code)


        **Participant fields (resolved via BACEN ParticipantesSTR list):**

        - `receiver_participant_name` — Recipient institution name (always
        present)

        - `withdraw_participant_name` — Withdrawal agent institution (PIX Saque
        only)

        - `change_participant_name` — Change agent institution (PIX Troco only)


        **Financial fields (returned when present in CobV QR):**

        - `due_date` — Due date (YYYY-MM-DD)

        - `penalty` — Late fee: `mode` (1=fixed, 2=%), `value`

        - `interest` — Interest: `mode` (1=BRL/day, 2=%/day, 3=%/month,
        4=%/year), `value`

        - `discount` — Discount: `mode` (1-4), `value`, `fixed_dates[]`

        - `rebate` — Rebate: `mode` (1=fixed, 2=%), `value`

        - `final_amount` — Final amount calculated by BACEN (with charges
        applied)

        - `withdraw_amount` — Withdrawal amount (PIX Saque)

        - `change_amount` — Change amount (PIX Troco)


        **Optimized flow (Two-Step — RECOMMENDED):**

        1. Decode the QR Code with this API (data is saved in lookup history)

        2. Confirm recipient details with the user

        3. Send the Cash-Out using the `X-Pix-Lookup-E2E: {end_to_end_id}`
        header (WITHOUT sending `br_code` again)

        4. The system uses pre-decoded data, avoiding a duplicate decode call


        **Scope:** `pix:cashout:write`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - br_code
              properties:
                br_code:
                  type: string
                  description: EMV payload from the QR Code
                  example: "00020126580014br.gov.bcb.pix0136263187470001865204000053039865405..."
      responses:
        '200':
          description: Decoded QR Code data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  qr_code_type:
                    type: string
                    enum: [static, dynamic]
                    example: static
                  pix_key:
                    type: string
                  amount:
                    type: number
                  receiver_name:
                    type: string
                  receiver_ispb:
                    type: string
                  receiver_participant_name:
                    type: string
                  end_to_end_id:
                    type: string
                    description: Use this in X-Pix-Lookup-E2E header for the two-step flow
                  due_date:
                    type: string
                    format: date
                  penalty:
                    type: object
                  interest:
                    type: object
                  discount:
                    type: object
                  rebate:
                    type: object
                  final_amount:
                    type: number
                  withdraw_amount:
                    type: number
                  change_amount:
                    type: number
        '400':
          description: Invalid or unreadable QR Code
  /api/v1/pix/med/{medId}/respond:
