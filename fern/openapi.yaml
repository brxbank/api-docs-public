    get:
      tags:
        - Webhooks (Notificações)
      summary: Listar Deliveries
      description: >-
        Lista as entregas (deliveries) de webhooks do cliente.


        **Filtros disponíveis:**

        - `webhookId` — Filtrar por webhook específico (UUID). Aceita também
        `webhook_id`

        - `transactionId` — Filtrar por transaction ID (UUID). Aceita também
        `transaction_id`

        - `eventType` — Filtrar por tipo de evento (ex:
        `pix.cash_in.confirmed`). Aceita também `event_type`

        - `status` — `delivered`, `pending`, `failed`

        - `start_date` / `end_date` — Filtro por período (formato YYYY-MM-DD)


        **Paginação:**

        - `page` — Número da página (1-based, padrão 1)

        - `limit` — Itens por página (max 100, padrão 50)

        - `offset` — Alternativa ao `page` (0-based)


        **Resposta inclui:** `page`, `totalPages`, `total`, `limit`, `offset`,
        `payload`, `response_body`


        Cada delivery mostra: ID, evento, status, payload enviado, resposta
        recebida, tentativas, timestamps.


        ### Delegação (Tenant)

        Para listar deliveries de um sub-cliente, adicione:

        ```

        X-Client-ID: <id-do-sub-cliente>

        ```
      parameters:
        - name: webhookId
          in: query
          schema:
            type: string
          description: Filtrar por webhook ID (aceita também webhook_id)
          example: 'wh-a1b2c3d4-e5f6-7890'
        - name: limit
          in: query
          schema:
            type: integer
          description: Itens por página (max 100, padrão 50)
          example: '20'
        - name: page
          in: query
          schema:
            type: integer
          description: Número da página (1-based)
          example: '1'
        - name: offset
          in: query
          schema:
            type: integer
          description: Offset alternativo à paginação (0-based)
          example: '0'
        - name: transactionId
          in: query
          schema:
            type: string
          description: Filtrar por transaction ID (UUID). Aceita também transaction_id
        - name: eventType
          in: query
          schema:
            type: string
          description: >-
            Filtrar por tipo de evento (ex: pix.cash_in.confirmed). Aceita
            também event_type
        - name: status
          in: query
          schema:
            type: string
          description: delivered, pending, failed
        - name: start_date
          in: query
          schema:
            type: string
          description: Filtro por data inicial (YYYY-MM-DD)
        - name: end_date
          in: query
          schema:
            type: string
          description: Filtro por data final (YYYY-MM-DD)
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
