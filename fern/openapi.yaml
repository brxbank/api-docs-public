        validação de assinaturas.


        **IMPORTANTE:** O `secret` é retornado **apenas na criação**. Guarde-o
        com segurança.


        ### Delegação (Tenant)

        Para criar webhook de um sub-cliente, adicione:

        ```

        X-Client-ID: <id-do-sub-cliente>

        ```
      requestBody:
