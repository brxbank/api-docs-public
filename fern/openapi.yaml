openapi: 3.0.0
info:
  title: BRZ API
  description: >-
    # BRZ - API Pública


    API completa do gateway PIX da CorpX (gw-core-pix). Conexão direta com
    BACEN/JDPI, sem provedores externos.


    ## URLs Base


    - **Produção:** `https://pix-api.corpx.com.br`
        
    - **Homologação:** `https://pix-api-staging.corpx.com.br`
        
    - **Local:** `http://localhost:8099`
        

    Todos os endpoints PIX usam o prefixo `/api/v1/pix`.


    ## Autenticação


    A API usa dois métodos de autenticação:


    ### 1\. Bearer Token (JWT) — Maioria dos endpoints


    Todos os endpoints **exceto Cash-In** usam Bearer Token:


    ```

    Authorization: Bearer <seu-token-jwt>

     ```

    Obtenha o JWT chamando `POST /v1/auth/bearer-token` com suas credenciais de
    API Key.


    ### 2\. API Key — Apenas endpoints de Cash-In


    Endpoints de Cash-In (`/api/v1/pix/cash-in/\\\\*`) usam dois headers:


    ```

    x-key-id: <seu-key-id>

    x-secret-key: <seu-secret-key>

     ```

    ## Reset de Senha


    ### Fluxo 1 — Cliente Independente (OTP duplo)


    1. `POST /v1/auth/reset-password` com `{ email }` (sem autenticação)
        
    2. Sistema envia OTP para email E telefone (códigos diferentes)
        
    3. `POST /v1/auth/confirm-reset-password` com `{ email, email_code,
    phone_code, new_password }`
        

    ### Fluxo 2 — Via Tenant (skip_otp)


    1. `POST /v1/auth/reset-password` com Bearer Token + `X-Client-Id` + `{
    email }`
        
    2. Se tenant tem `skip_otp=true`: retorna senha temporária no response
        
    3. Sub-cliente faz login com senha temporária e é obrigado a trocar
        

    ## Limite de Requisições


    - Padrão: 50 req/s por cliente, pico de até 100.
        
    - Ao exceder, retorna HTTP 429 com header `Retry-After`.
        

    ## Headers Comuns


    | Header | Obrigatório | Descrição |

    | --- | --- | --- |

    | `Authorization` | Sim (Bearer) | `Bearer` para endpoints PIX |

    | `x-key-id` | Sim (Cash-In) | ID da API Key |

    | `x-secret-key` | Sim (Cash-In) | Secret da API Key |

    | `X-Idempotency-Key` | Recomendado | Evita operações duplicadas (UUID) |

    | `Content-Type` | Sim (POST/PUT) | Sempre `application/json` |


    ---


    ## Fluxo de Onboarding (Passo a Passo)


    ### Passo 1 — Criar Conta


    Crie sua conta com `POST /v1/auth/signup`. Guarde o `keyId` e `secretKey`
    retornados. Codigos OTP serao enviados por email e SMS.


    ### Passo 1b — Verificar Email


    Verifique seu email com `POST /v1/auth/verify-email` usando o codigo OTP
    recebido.


    ### Passo 1c — Verificar Telefone


    Verifique seu telefone com `POST /v1/auth/verify-phone` usando o codigo OTP
    recebido por SMS.


    ### Passo 1d — Reenviar OTP (opcional)


    Se necessario, reenvie o codigo com `POST /v1/auth/resend-otp` (max 5 por
    hora).


    ### Passo 2 — Login


    Faça login com `POST /v1/auth/login` para obter o token de sessão.


    ### Passo 3 — Enviar Documentos (3 etapas)


    1. Obtenha URLs pré-assinadas com `POST /v1/auth/documents/presigned-urls`
        
    2. Faça `PUT` de cada arquivo diretamente na URL do S3 (raw binary, sem
    FormData)
        
    3. Confirme os uploads com `POST /v1/auth/documents/confirm`
        

    **Tipos de documento (Pessoa Física):** `cpf_frente`, `cpf_verso`,
    `selfie_com_cpf`, `comprovante_residencia`  

    **Tipos de documento (Pessoa Jurídica):** `cnpj`, `contrato_social`,
    `comprovante_residencia_empresa`


    ### Passo 4 — Aguardar Aprovação


    Acompanhe o status com `GET /v1/auth/status`. Aguarde a aprovação da equipe.


    ### Passo 5 — Gerar Bearer Token


    Após aprovação, gere seu Bearer Token com `POST /v1/auth/bearer-token`
    usando suas credenciais.


    ### Passo 6 — Registrar Chave PIX


    Registre uma chave PIX no DICT/BACEN com `POST /api/v1/pix/keys`. Basta
    enviar `{"key_type": "EVP"}` — os dados da conta são preenchidos
    automaticamente do onboarding!


    ### Passo 7 — Pronto para Operar!


    Agora você pode criar cobranças (Cash-In), fazer transferências e consultar
    saldo.


    ---
  version: 1.0.0
servers:
  - url: https://pix-api.corpx.com.br
    description: Production
  - url: https://pix-api-staging.corpx.com.br
    description: Staging
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
security:
  - bearerAuth: []
tags:
  - name: Saúde do Serviço
    description: Endpoints de verificação de saúde. Sem autenticação.
  - name: Chaves PIX (DICT/BACEN)
    description: |-
      Gerenciamento de chaves PIX no DICT do BACEN.

      **Autenticação:** Bearer Token
      **Escopo necessário:** `pix:keys:read` e/ou `pix:keys:write`
  - name: Saldo PIX
    description: |-
      Consulta de saldo da conta.

      **Autenticação:** Bearer Token
      **Escopo:** `pix:balance:read`
  - name: Transações
    description: >-
      Consulta de transações PIX do cliente.


      Endpoints servidos pelo **gw-payment-orchestrator** via ALB path
      `/api/v1/transactions/*`.


      **Autenticação:** Bearer Token

      **Escopo:** Bearer (JWT obtido via `/v1/auth/bearer-token`)
  - name: Limites PIX
    description: |-
      Consulta de limites de transação PIX.

      **Autenticação:** Bearer Token
      **Escopo:** `pix:limits:read`
  - name: PIX Cash-In (Recebimentos)
    description: >-
      Criar e gerenciar cobranças PIX (Cash-In). Gera QR Code para o pagador.


      **Autenticação:** API Key via headers `x-key-id` + `x-secret-key` (NÃO usa
      Bearer Token)


      **Endpoints:**

      - `POST /cash-in` — Criar cobrança assíncrona

      - `POST /cash-in/sync` — Criar cobrança síncrona via SPI

      - `GET /cash-in/{id}` — Consultar status

      - `POST /cash-in/{id}/cancel` — Cancelar cobrança


      **Campos financeiros (CobV — cobrança com vencimento):**

      - `due_date` — Data de vencimento (YYYY-MM-DD)

      - `penalty` — Multa após vencimento (`mode` + `value`)

      - `interest` — Juros diários (`mode` + `value`)

      - `discount` — Desconto antecipado (`mode` + `value` + `fixed_dates[]`)

      - `rebate` — Abatimento (`mode` + `value`)


      **PIX Saque e PIX Troco:**

      - `withdraw_amount` — Valor de saque (PIX Saque)

      - `change_amount` — Valor de troco (PIX Troco)
  - name: PIX Cash-In (Recebimentos) > Reversals (Devoluções PIX)
    description: >-
      Endpoints para gerenciar devoluções (reversals) de pagamentos PIX
      recebidos.


      **Autenticação:** Bearer Token


      **Scopes necessários:**

      - `pix:reversals:write` para criar devoluções

      - `pix:reversals:read` para consultar devoluções
  - name: PIX Cash-Out (Pagamentos)
    description: |-
      Enviar pagamentos PIX (Cash-Out) via Temporal workflows.

      **Autenticação:** Bearer Token
      **Escopo:** `pix:cashout:write` / `pix:cashout:read`
  - name: MED - Devoluções Especiais
    description: |-
      Gerenciar pedidos de devolução MED (Mecanismo Especial de Devolução).

      **Autenticação:** Bearer Token
      **Escopo:** `pix:med:read` / `pix:med:write`
  - name: Webhooks (Notificações)
    description: >-
      Endpoints para gerenciar webhooks de notificação. Permite que clientes
      registrem URLs para receber notificações em tempo real sobre eventos PIX.

        ## Visão Geral

        O sistema de webhooks envia notificações HTTP POST para URLs cadastradas pelo cliente quando eventos ocorrem (PIX recebido, transferência confirmada, etc.).

        ## Autenticação

        Todos os endpoints usam Bearer Token JWT com os seguintes scopes:
        - `webhooks:read` — Listar, buscar webhooks e deliveries
        - `webhooks:write` — Criar, atualizar, excluir webhooks e reenviar deliveries

        **IMPORTANTE:** Os tokens precisam incluir explicitamente `webhooks:read` e/ou `webhooks:write` nos scopes solicitados na geração do token. API Keys criadas pelo sistema já incluem esses scopes por padrão.

        ## Delegação (Multi-Tenant)

        Tenants primários podem gerenciar webhooks dos seus sub-clientes usando o header `X-Client-ID`:
        ```
        Authorization: Bearer <jwt-do-tenant>
        X-Client-ID: <id-do-sub-cliente>
        ```
        O sistema valida que o sub-cliente pertence ao tenant antes de permitir a operação.

        ## Eventos Suportados

        Estes são os eventos que podem ser registrados na configuração do webhook (`events` array):

        | Evento | Descrição |
        |--------|----------|
        | `*` | Todos os eventos |
        | `pix.cash_in.received` | Cash-in PIX recebido |
        | `pix.cash_in.confirmed` | Cash-in PIX confirmado |
        | `pix.cash_in.expired` | Cash-in PIX expirado |
        | `pix.cash_in.refunded` | Cash-in PIX devolvido |
        | `pix.cash_out.created` | Cash-out PIX criado |
        | `pix.cash_out.completed` | Cash-out PIX completado |
        | `pix.cash_out.failed` | Cash-out PIX falhou |
        | `pix.cash_out.returned` | Cash-out PIX devolvido |
        | `pix.reversal.created` | Devolução PIX criada |
        | `pix.reversal.completed` | Devolução PIX concluída |
        | `pix.reversal.failed` | Devolução PIX falhou |
        | `pix.inbound.received` | PIX inbound recebido (direto) |
        | `onboarding.status_changed` | Status do onboarding alterado (aprovado/rejeitado) |
        | `limits.request_approved` | Solicitação de alteração de limite aprovada |
        | `limits.request_rejected` | Solicitação de alteração de limite rejeitada |
        | `pix.infraction.received` | Notificação de infração PIX recebida |
        | `pix.med_refund.received` | Solicitação de devolução MED recebida |
        | `onboarding.status_changed` | Status de onboarding alterado (multi-tenant) |
        | `balance.updated` | Saldo atualizado |
        | `payment_link.paid` | Link de pagamento pago |
        | `payment_link.expired` | Link de pagamento expirado |

        ## Payload de Notificação

        Cada notificação enviada para sua URL usa o formato legacy compatível:
        ```json
        {
          "id": "uuid-da-transacao",
          "source": "pixgw",
          "event": "pix.cash_in.confirmed",
          "timestamp": "2025-01-15T10:30:00Z",
          "correlationId": "uuid-da-transacao",
          "data": {
            "transaction": {
              "id": "uuid-interno",
              "amount": 150.00,
              "status": "completed",
              "reference": "ref-001",
              "pixKey": "chave@pix.com",
              "pixKeyType": "EMAIL",
              "payer": {
                "name": "João Silva",
                "document": "123.456.789-00"
              }
            }
          }
        }
        ```

        A notificação inclui um header `X-Webhook-Signature` com HMAC-SHA256 usando o `secret` do webhook para validação.

        ### Status internos no payload

        | Status | Significado |
        |--------|-----------|
        | `pending` | Recebido, aguardando processamento |
        | `processing` | Em processamento |
        | `completed` | Concluído com sucesso |
        | `failed` | Falhou |
        | `expired` | Expirado |
        | `cancelled` | Cancelado |
        | `refunded` | Devolvido |
        | `returned` | Retornado (cash-out) |

        ## Retentativas

        Se sua URL retornar erro (status >= 400 ou timeout), o sistema reenvia automaticamente com backoff exponencial:
        - 1ª retentativa: 1 minuto
        - 2ª retentativa: 5 minutos
        - 3ª retentativa: 30 minutos
        - 4ª retentativa: 1 hora
        - 5ª retentativa: enviado para DLQ (Dead Letter Queue)

        ## Fluxo Temporal

        Eventos de cash-in com status `completed` e cash-out com status final são processados pelo Temporal Workflow antes da entrega do webhook. O workflow gerencia:
        - Captura de ledger (saldo)
        - Checagem de retenção (cash-in)
        - Envio do webhook para o cliente

        Isso garante consistência entre o saldo e a notificação.

        ---
  - name: P2P (Transferência Interna)
    description: >-
      Endpoints para transferência P2P interna entre contas do mesmo tenant. Não
      passa pelo SPI (BACEN) — é um movimento contábil interno no Ledger.


      ## Delegação Multi-Tenant


      O tenant primário pode operar P2P em nome de um sub-cliente adicionando o
      header:

      ```

      X-Client-ID: <id-do-sub-cliente>

      ```


      O Bearer Token deve ser do tenant primário. O middleware valida que:

      1. O caller é uma conta primária (não é sub-cliente)

      2. O sub-cliente pertence ao tenant

      3. O sub-cliente está com status `active`


      Se qualquer validação falhar, retorna HTTP 403 com código
      `DELEGATION_DENIED`.


      ### Comportamento com delegação


      | Operação | `ClientID` usado | `TenantID` usado |

      |----------|-----------------|------------------|

      | Lookup | Sub-cliente | Tenant (escopo de busca) |

      | Transfer (sender) | Sub-cliente | Tenant (validação de escopo) |
paths:
  /health:
    get:
      tags:
        - Saúde do Serviço
      summary: Health Check
      description: |-
        Verificação básica de saúde do serviço.

        Retorna HTTP 200 se o serviço está no ar.

        **Resposta:** `{"status":"healthy","service":"gw-core-pix-api"}`
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /ready:
    get:
      tags:
        - Saúde do Serviço
      summary: Readiness Check
      description: |-
        Verifica se o serviço está pronto para receber requisições.

        Retorna HTTP 200 quando está pronto.

        **Resposta:** `{"status":"ready","service":"gw-core-pix-api"}`
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/pix/keys:
    post:
      tags:
        - Chaves PIX (DICT/BACEN)
      summary: Passo 6 — Registrar Chave PIX
      description: >-
        Registra uma nova chave PIX no DICT/BACEN.


        **Simplificado!** Apenas `key_type` é obrigatório. Os dados da conta
        (account_type, account_number, branch_number, person_type, tax_id, name,
        trade_name, account_open_date) são preenchidos automaticamente a partir
        dos dados do onboarding aprovado.


        **Tipos de chave (`key_type`):**

        - `CPF` — CPF do titular (11 dígitos)

        - `CNPJ` — CNPJ da empresa (14 dígitos)

        - `EMAIL` — E-mail

        - `PHONE` — Telefone (+55...)

        - `EVP` — Chave aleatória (gerada pelo BACEN, envie `key` vazio)


        **Campo obrigatório:** `key_type`

        **Campo opcional:** `key` (obrigatório para CPF, CNPJ, EMAIL, PHONE;
        vazio para EVP)


        **Campos opcionais (override):** Se precisar sobrescrever os dados do
        onboarding, envie qualquer um destes campos: `account_type`,
        `account_number`, `branch_number`, `person_type`, `tax_id`, `name`,
        `trade_name`, `account_open_date`


        **Dica:** Para chave EVP (aleatória), basta enviar `{"key_type":
        "EVP"}`. O BACEN gera a chave automaticamente.


        **Escopo:** `pix:keys:write`
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                key_type: EVP
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    get:
      tags:
        - Chaves PIX (DICT/BACEN)
      summary: Listar Chaves PIX
      description: |-
        Lista todas as chaves PIX registradas para o cliente autenticado.

        **Escopo:** `pix:keys:read`
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/pix/keys/:key:
    get:
      tags:
        - Chaves PIX (DICT/BACEN)
      summary: Buscar Chave PIX por Valor
      description: |-
        Busca uma chave PIX específica pelo valor (CPF, e-mail, UUID EVP, etc.).

        **Escopo:** `pix:keys:read`
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    delete:
      tags:
        - Chaves PIX (DICT/BACEN)
      summary: Excluir Chave PIX
      description: |-
        Remove uma chave PIX do DICT/BACEN.

        **Parâmetro da URL:** `key` — valor da chave PIX
        **Body:** `reason` (opcional, padrão: `USER_REQUESTED`)

        **Escopo:** `pix:keys:write`
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/pix/balance:
    get:
      tags:
        - Saldo PIX
      summary: Consultar Saldo
      description: >-
        Consulta o saldo da conta. Se `account_id` for omitido, usa a conta
        padrão do cliente.


        **Resposta (200):**

        ```json

        {
          "account_id": "acc-uuid",
          "available_balance": "10000.00",
          "blocked_balance": "500.00",
          "total_balance": "10500.00",
          "currency": "BRL",
          "updated_at": "2025-01-15T10:00:00Z"
        }

        ```


        **Escopo:** `pix:balance:read`
      parameters:
        - name: account_id
          in: query
          schema:
            type: string
          description: ID da conta (opcional, usa a conta padrão se omitido)
          example: acc-uuid-aqui
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/transactions:
    get:
      tags:
        - Transações
      summary: Listar Transações
      description: >-
        Lista todas as transações do cliente autenticado com paginação e filtro
        por tipo.


        **Query Parameters:**

        - `limit` — Quantidade por página (1-100, padrão: 20)

        - `offset` — Offset para paginação (padrão: 0)

        - `type` — Filtro por tipo: `cash_in`, `cash_out`, `p2p` (opcional)


        **Resposta (200):**

        ```json

        {
          "success": true,
          "data": {
            "transactions": [
              {
                "id": "uuid",
                "external_id": "123",
                "client_id": "uuid",
                "type": "cash_out",
                "status": "completed",
                "amount": "100.00",
                "gross_amount": "100.00",
                "net_amount": "99.50",
                "tax_amount": "0.50",
                "currency": "BRL",
                "pix_key": "email@example.com",
                "pix_key_type": "email",
                "e2e": "E1234...",
                "payer_name": "João Silva",
                "payer_document": "12345678901",
                "receiver_name": "Maria Santos",
                "receiver_document": "98765432100",
                "created_at": "2026-03-26T20:00:00Z",
                "updated_at": "2026-03-26T20:01:00Z",
                "processed_at": "2026-03-26T20:01:00Z"
              }
            ],
            "total": 1,
            "limit": 20,
            "offset": 0
          }
        }

        ```
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
          description: 'Quantidade de registros por página (1-100, padrão: 20)'
          example: '20'
        - name: offset
          in: query
          schema:
            type: integer
          description: 'Offset para paginação (padrão: 0)'
          example: '0'
        - name: type
          in: query
          schema:
            type: string
          description: 'Filtrar por tipo: cash_in, cash_out, p2p (opcional)'
          example: cash_in
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/transactions/:id:
    get:
      tags:
        - Transações
      summary: Consultar Transação por ID
      description: >-
        Consulta os detalhes de uma transação específica pelo ID. Retorna 404 se
        a transação não pertencer ao cliente autenticado.


        **Resposta (200):**

        ```json

        {
          "success": true,
          "data": {
            "id": "uuid",
            "external_id": "123",
            "client_id": "uuid",
            "type": "cash_out",
            "status": "completed",
            "amount": "100.00",
            "gross_amount": "100.00",
            "net_amount": "99.50",
            "tax_amount": "0.50",
            "currency": "BRL",
            "pix_key": "email@example.com",
            "pix_key_type": "email",
            "e2e": "E1234...",
            "payer_name": "João Silva",
            "receiver_name": "Maria Santos",
            "created_at": "2026-03-26T20:00:00Z",
            "updated_at": "2026-03-26T20:01:00Z",
            "processed_at": "2026-03-26T20:01:00Z"
          }
        }

        ```
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/pix/limits:
    get:
      tags:
        - Limites PIX
      summary: Consultar Limites
      description: >-
        Consulta os limites de transação PIX da conta, agrupados por tipo
        (pix_out, pix_in, ted, boleto, p2p) e período (daytime/nighttime).


        **Resposta (200):**

        ```json

        {
          "limits": {
            "pix_out": {
              "daytime": {
                "perTransaction": "50000.00",
                "daily": "200000.00",
                "used": "0.00"
              },
              "nighttime": {
                "perTransaction": "5000.00",
                "daily": "20000.00",
                "used": "0.00"
              }
            },
            "pix_in": {
              "daytime": {
                "perTransaction": "100000.00",
                "daily": "500000.00",
                "used": "0.00"
              },
              "nighttime": {
                "perTransaction": "10000.00",
                "daily": "50000.00",
                "used": "0.00"
              }
            }
          },
          "period": {
            "daytime": "06:00-20:00",
            "nighttime": "20:00-06:00"
          },
          "currency": "BRL"
        }

        ```


        **Escopo:** `pix:limits:read`
      parameters:
        - name: account_id
          in: query
          schema:
            type: string
          description: ID da conta (opcional, usa a conta padrão se omitido)
          example: acc-uuid-aqui
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/pix/limits/requests:
    post:
      tags:
        - Limites PIX
      summary: Solicitar Alteração de Limite
      description: >-
        Cria uma solicitação de alteração de limite PIX. A solicitação fica
        pendente até ser aprovada ou rejeitada por um administrador.


        **Campos obrigatórios:**

        - `type` — Tipo de limite: `pix_in`, `pix_out`, `ted`, `boleto`, `p2p`,
        `total`

